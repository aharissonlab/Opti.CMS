name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 8.0.x
  PROJECT_PATH: Opti.CMS/Opti.CMS.csproj
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  package:
    name: Publish application artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            Opti.CMS/Opti.CMS.csproj
            Opti.CMS/Directory.Build.props
            Opti.CMS/nuget.config

      - name: Restore dependencies
        run: dotnet restore $PROJECT_PATH --configfile Opti.CMS/nuget.config

      - name: Publish application
        run: dotnet publish $PROJECT_PATH --configuration Release --no-restore --output ./artifacts/publish

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.sha }}
          path: artifacts/publish
          if-no-files-found: error
          retention-days: 30

  container:
    name: Build and publish container
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: read
      packages: write
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./Opti.CMS
          file: ./Opti.CMS/Docker/web.release.dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
